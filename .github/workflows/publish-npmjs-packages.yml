name: Publish Packages to NPM

on:
  #release:
  #  types: [published]
  workflow_dispatch:

jobs:
  publish-npm:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - run: corepack enable
      - run: yarn install --immutable
      - run: yarn build

      - name: Publish
        run: |
          cd packages/client
          npm publish --access public --provenance
         
