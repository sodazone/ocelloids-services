name: Publish Packages to NPM

on:
  #release:
  #  types: [published]
  workflow_dispatch:

jobs:
  publish-npm:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install --immutable

      - name: Build
        run: yarn build

      - name: Publish ocelloids client
        run: yarn workspace @sodazone/ocelloids-client npm publish --access public
        env:
          NPM_CONFIG_PROVENANCE: true
         
